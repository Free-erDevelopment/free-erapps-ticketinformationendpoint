<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0F0F12;
            min-height: 100vh;
            padding: 40px 20px;
            color: #344271;
        }
        .container { width: 100%; max-width: 800px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 6px;
            color: #344271;
            font-weight: 700;
        }
        .subtitle {
            text-align: center;
            color: #344271;
            opacity: 0.7;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 18px;
            border: 1px solid rgba(52, 66, 113, 0.25);
            border-radius: 8px;
            background: transparent;
            color: #344271;
            opacity: 0.6;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s, background 0.2s;
        }
        .filter-btn:hover { opacity: 0.9; background: rgba(52, 66, 113, 0.08); }
        .filter-btn.active { opacity: 1; background: rgba(52, 66, 113, 0.15); }
        .ticket-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(52, 66, 113, 0.15);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .ticket-item:hover { border-color: rgba(52, 66, 113, 0.35); }
        .ticket-item.done {
            opacity: 0.5;
            border-color: rgba(52, 66, 113, 0.08);
        }
        .ticket-item.done .ticket-message { text-decoration: line-through; }
        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
            gap: 10px;
        }
        .ticket-title { font-weight: 600; font-size: 1rem; color: #344271; flex: 1; }
        .ticket-badges { display: flex; gap: 6px; flex-wrap: wrap; }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge.bug { background: rgba(180, 60, 60, 0.15); color: #b84c4c; }
        .badge.suggestion { background: rgba(52, 66, 113, 0.2); color: #344271; }
        .badge.done { background: rgba(60, 180, 60, 0.15); color: #4cb84c; }
        .ticket-message {
            color: #344271;
            opacity: 0.8;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }
        .ticket-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #344271;
            opacity: 0.5;
        }
        .ticket-actions { display: flex; gap: 8px; }
        .action-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
        }
        .action-btn:hover { opacity: 0.8; }
        .action-btn.done-btn { background: rgba(60, 180, 60, 0.15); color: #4cb84c; }
        .action-btn.delete-btn { background: rgba(180, 60, 60, 0.15); color: #b84c4c; }
        .empty-msg {
            text-align: center;
            color: #344271;
            opacity: 0.4;
            padding: 50px 0;
            font-style: italic;
        }
        .loading {
            text-align: center;
            color: #344271;
            opacity: 0.5;
            padding: 50px 0;
        }
        .refresh-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .refresh-btn {
            padding: 8px 18px;
            border: 1px solid rgba(52, 66, 113, 0.25);
            border-radius: 8px;
            background: transparent;
            color: #344271;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s, background 0.2s;
        }
        .refresh-btn:hover { background: rgba(52, 66, 113, 0.08); }
        .status-msg {
            display: none;
            background: rgba(52, 66, 113, 0.12);
            border: 1px solid rgba(52, 66, 113, 0.25);
            color: #344271;
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .status-msg.show { display: block; }
        .status-msg.error { background: rgba(180, 60, 60, 0.12); border-color: rgba(180, 60, 60, 0.25); }
        /* Modal styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: #0F0F12;
            border: 1px solid rgba(52, 66, 113, 0.3);
            border-radius: 14px;
            padding: 30px;
            width: 90%;
            max-width: 440px;
        }
        .modal-box h2 { color: #344271; font-size: 1.3rem; margin-bottom: 16px; }
        .modal-box label { display: block; color: #344271; opacity: 0.7; font-size: 0.8rem; margin-bottom: 4px; }
        .modal-box input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(52, 66, 113, 0.25);
            background: rgba(0, 0, 0, 0.3);
            color: #344271;
            font-size: 0.95rem;
            font-family: inherit;
            margin-bottom: 14px;
        }
        .modal-box input:focus { outline: none; border-color: #344271; }
        .modal-btns { display: flex; gap: 10px; margin-top: 6px; }
        .modal-btns button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .modal-btns .save-btn { background: #344271; color: #0F0F12; }
        .modal-btns .cancel-btn { background: transparent; color: #344271; border: 1px solid rgba(52, 66, 113, 0.25); }
        .settings-hint {
            text-align: center;
            color: #344271;
            opacity: 0.4;
            font-size: 0.75rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ticket Dashboard</h1>
        <p class="subtitle">View and manage submitted tickets</p>

        <div id="statusMsg" class="status-msg"></div>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="open">Open</button>
            <button class="filter-btn" data-filter="done">Done</button>
            <button class="filter-btn" data-filter="bug">Bug Reports</button>
            <button class="filter-btn" data-filter="suggestion">Suggestions</button>
        </div>

        <div class="refresh-bar">
            <button class="refresh-btn" onclick="openSettings()">Settings</button>
            <button class="refresh-btn" id="refreshBtn">Refresh</button>
        </div>

        <div id="ticketsContainer">
            <div class="loading">Loading tickets...</div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal-box">
            <h2>GitHub Settings</h2>
            <label>GitHub Username</label>
            <input id="settingsUsername" type="text" placeholder="e.g. your-username">
            <label>Repository Name</label>
            <input id="settingsRepo" type="text" placeholder="e.g. ticket-tracker">
            <label>Personal Access Token</label>
            <input id="settingsToken" type="password" placeholder="ghp_...">
            <div class="modal-btns">
                <button class="save-btn" id="saveSettingsBtn">Save</button>
                <button class="cancel-btn" id="closeSettingsBtn">Cancel</button>
            </div>
            <div class="settings-hint">Your token is stored in your browser only. Never shared.</div>
        </div>
    </div>

    <script>
        const SETTINGS_KEY = 'ticket_github_settings';

        function getSettings() {
            const data = localStorage.getItem(SETTINGS_KEY);
            return data ? JSON.parse(data) : null;
        }

        function saveSettings(username, repo, token) {
            localStorage.setItem(SETTINGS_KEY, JSON.stringify({ username, repo, token }));
        }

        function getConfig() {
            const s = getSettings();
            return (s && s.username && s.repo && s.token) ? s : null;
        }

        function openSettings() {
            const s = getSettings() || {};
            document.getElementById('settingsUsername').value = s.username || '';
            document.getElementById('settingsRepo').value = s.repo || '';
            document.getElementById('settingsToken').value = s.token || '';
            document.getElementById('settingsModal').classList.add('show');
        }

        document.getElementById('saveSettingsBtn').addEventListener('click', function() {
            const u = document.getElementById('settingsUsername').value.trim();
            const r = document.getElementById('settingsRepo').value.trim();
            const t = document.getElementById('settingsToken').value.trim();
            if (u && r && t) {
                saveSettings(u, r, t);
                document.getElementById('settingsModal').classList.remove('show');
                showStatus('Settings saved. Refreshing...');
                loadTickets();
            } else {
                showStatus('All fields are required.', true);
            }
        });

        document.getElementById('closeSettingsBtn').addEventListener('click', function() {
            document.getElementById('settingsModal').classList.remove('show');
        });

        document.getElementById('settingsModal').addEventListener('click', function(e) {
            if (e.target === this) document.getElementById('settingsModal').classList.remove('show');
        });

        let allIssues = [];
        let currentFilter = 'all';

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderTickets();
            });
        });

        document.getElementById('refreshBtn').addEventListener('click', loadTickets);

        function showStatus(msg, isError) {
            const el = document.getElementById('statusMsg');
            el.textContent = msg;
            el.classList.remove('error');
            if (isError) el.classList.add('error');
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        async function loadTickets() {
            const config = getConfig();
            if (!config) {
                document.getElementById('ticketsContainer').innerHTML = `
                    <div class="empty-msg">
                        GitHub not configured.
                        <br><br>
                        <button class="refresh-btn" onclick="openSettings()">Configure Now</button>
                    </div>
                `;
                return;
            }

            const container = document.getElementById('ticketsContainer');
            container.innerHTML = '<div class="loading">Loading tickets...</div>';

            const url = `https://api.github.com/repos/${config.username}/${config.repo}/issues?state=all&per_page=100`;

            try {
                const res = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${config.token}`,
                        'Accept': 'application/vnd.github+json'
                    }
                });

                if (!res.ok) {
                    const err = await res.json();
                    container.innerHTML = `<div class="empty-msg">Error: ${err.message}</div>`;
                    return;
                }

                allIssues = await res.json();
                renderTickets();
            } catch (err) {
                container.innerHTML = '<div class="empty-msg">Could not reach GitHub. Check your internet connection.</div>';
            }
        }

        function renderTickets() {
            const container = document.getElementById('ticketsContainer');

            let filtered = allIssues.filter(issue => {
                if (issue.pull_request) return false;
                const labels = issue.labels.map(l => l.name);
                const isDone = labels.includes('done');
                const isBug = labels.includes('bug');
                const isSuggestion = labels.includes('suggestion');
                switch (currentFilter) {
                    case 'open': return !isDone;
                    case 'done': return isDone;
                    case 'bug': return isBug;
                    case 'suggestion': return isSuggestion;
                    default: return true;
                }
            });

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-msg">No tickets match this filter.</div>';
                return;
            }

            container.innerHTML = filtered.map(issue => {
                const labels = issue.labels.map(l => l.name);
                const isDone = labels.includes('done');
                const isBug = labels.includes('bug');
                const typeLabel = isBug ? 'Bug' : 'Suggestion';
                const typeClass = isBug ? 'bug' : 'suggestion';
                const date = new Date(issue.created_at).toLocaleString();

                return `
                    <div class="ticket-item ${isDone ? 'done' : ''}">
                        <div class="ticket-header">
                            <div class="ticket-title">${escapeHtml(issue.title)}</div>
                            <div class="ticket-badges">
                                <span class="badge ${typeClass}">${typeLabel}</span>
                                ${isDone ? '<span class="badge done">Done</span>' : ''}
                            </div>
                        </div>
                        <div class="ticket-message">${escapeHtml(issue.body || 'No description')}</div>
                        <div class="ticket-footer">
                            <span>#${issue.number} - ${date}</span>
                            <div class="ticket-actions">
                                ${!isDone ? `<button class="action-btn done-btn" onclick="markDone(${issue.number})">Mark as Done</button>` : ''}
                                <button class="action-btn delete-btn" onclick="deleteTicket(${issue.number})">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function markDone(issueNumber) {
            const config = getConfig();
            if (!config) return;
            const url = `https://api.github.com/repos/${config.username}/${config.repo}/issues/${issueNumber}/labels`;

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${config.token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github+json'
                    },
                    body: JSON.stringify({ labels: ['done'] })
                });

                if (res.ok) {
                    showStatus('Ticket marked as done.');
                    loadTickets();
                } else {
                    const err = await res.json();
                    showStatus('Error: ' + err.message, true);
                }
            } catch (err) {
                showStatus('Could not reach GitHub.', true);
            }
        }

        async function deleteTicket(issueNumber) {
            if (!confirm('Delete this ticket permanently? This cannot be undone.')) return;

            const config = getConfig();
            if (!config) return;
            const url = `https://api.github.com/repos/${config.username}/${config.repo}/issues/${issueNumber}`;

            try {
                const res = await fetch(url, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${config.token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github+json'
                    },
                    body: JSON.stringify({ state: 'closed' })
                });

                if (res.ok) {
                    showStatus('Ticket deleted (closed).');
                    loadTickets();
                } else {
                    const err = await res.json();
                    showStatus('Error: ' + err.message, true);
                }
            } catch (err) {
                showStatus('Could not reach GitHub.', true);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadTickets();
    </script>
</body>
</html>
