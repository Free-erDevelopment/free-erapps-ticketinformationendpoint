<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Report Form</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0F0F12;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            color: #344271;
        }
        .container { width: 100%; max-width: 560px; }
        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 6px;
            color: #344271;
            font-weight: 700;
        }
        .subtitle {
            text-align: center;
            color: #344271;
            opacity: 0.7;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(52, 66, 113, 0.2);
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }
        .type-toggle {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border: 1px solid rgba(52, 66, 113, 0.25);
            border-radius: 10px;
            overflow: hidden;
        }
        .type-btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: #344271;
            opacity: 0.5;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            font-family: inherit;
        }
        .type-btn:hover { opacity: 0.8; background: rgba(52, 66, 113, 0.08); }
        .type-btn.active { opacity: 1; background: rgba(52, 66, 113, 0.15); }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #344271;
            opacity: 0.8;
        }
        textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(52, 66, 113, 0.25);
            background: rgba(0, 0, 0, 0.3);
            color: #344271;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s;
            resize: vertical;
            min-height: 140px;
        }
        textarea::placeholder { color: #344271; opacity: 0.35; }
        textarea:focus {
            outline: none;
            border-color: #344271;
            box-shadow: 0 0 0 3px rgba(52, 66, 113, 0.15);
        }
        .btn-submit {
            width: 100%;
            padding: 13px 28px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            background: #344271;
            color: #0F0F12;
            font-family: inherit;
            transition: opacity 0.2s, transform 0.15s;
        }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .status-msg {
            display: none;
            background: rgba(52, 66, 113, 0.12);
            border: 1px solid rgba(52, 66, 113, 0.25);
            color: #344271;
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 16px;
            text-align: center;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .status-msg.show { display: block; }
        .status-msg.error { background: rgba(180, 60, 60, 0.12); border-color: rgba(180, 60, 60, 0.25); }
        .settings-link {
            text-align: center;
            margin-top: 16px;
        }
        .settings-link a {
            color: #344271;
            opacity: 0.5;
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: underline;
        }
        .settings-link a:hover { opacity: 0.8; }
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: #0F0F12;
            border: 1px solid rgba(52, 66, 113, 0.3);
            border-radius: 14px;
            padding: 30px;
            width: 90%;
            max-width: 440px;
        }
        .modal-box h2 { color: #344271; font-size: 1.3rem; margin-bottom: 16px; }
        .modal-box label { display: block; color: #344271; opacity: 0.7; font-size: 0.8rem; margin-bottom: 4px; }
        .modal-box input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(52, 66, 113, 0.25);
            background: rgba(0, 0, 0, 0.3);
            color: #344271;
            font-size: 0.95rem;
            font-family: inherit;
            margin-bottom: 14px;
        }
        .modal-box input:focus { outline: none; border-color: #344271; }
        .modal-btns { display: flex; gap: 10px; margin-top: 6px; }
        .modal-btns button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .modal-btns .save-btn { background: #344271; color: #0F0F12; }
        .modal-btns .cancel-btn { background: transparent; color: #344271; border: 1px solid rgba(52, 66, 113, 0.25); }
        .settings-hint {
            text-align: center;
            color: #344271;
            opacity: 0.4;
            font-size: 0.75rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Report an Issue</h1>
        <p class="subtitle">Submit a bug report or feature suggestion</p>

        <div class="card">
            <form id="ticketForm">
                <div class="type-toggle" id="typeToggle">
                    <button type="button" class="type-btn active" data-value="bug">Bug Report</button>
                    <button type="button" class="type-btn" data-value="suggestion">Feature Suggestion</button>
                </div>

                <div class="form-group">
                    <label for="message">Description</label>
                    <textarea id="message" name="message" placeholder="Describe the issue or suggestion in detail..." required></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Submit Ticket</button>
                <div id="statusMsg" class="status-msg"></div>
            </form>
            <div class="settings-link">
                <a onclick="openSettings()">Configure GitHub settings</a>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal-box">
            <h2>GitHub Settings</h2>
            <label>GitHub Username</label>
            <input id="settingsUsername" type="text" placeholder="e.g. your-username">
            <label>Repository Name</label>
            <input id="settingsRepo" type="text" placeholder="e.g. ticket-tracker">
            <label>Personal Access Token</label>
            <input id="settingsToken" type="password" placeholder="ghp_...">
            <div class="modal-btns">
                <button class="save-btn" id="saveSettingsBtn">Save</button>
                <button class="cancel-btn" id="closeSettingsBtn">Cancel</button>
            </div>
            <div class="settings-hint">Your token is stored in your browser only. Never shared.</div>
        </div>
    </div>

    <script>
        const SETTINGS_KEY = 'ticket_github_settings';

        function getSettings() {
            const data = localStorage.getItem(SETTINGS_KEY);
            return data ? JSON.parse(data) : null;
        }

        function saveSettings(username, repo, token) {
            localStorage.setItem(SETTINGS_KEY, JSON.stringify({ username, repo, token }));
        }

        function getConfig() {
            const s = getSettings();
            return (s && s.username && s.repo && s.token) ? s : null;
        }

        function openSettings() {
            const s = getSettings() || {};
            document.getElementById('settingsUsername').value = s.username || '';
            document.getElementById('settingsRepo').value = s.repo || '';
            document.getElementById('settingsToken').value = s.token || '';
            document.getElementById('settingsModal').classList.add('show');
        }

        document.getElementById('saveSettingsBtn').addEventListener('click', function() {
            const u = document.getElementById('settingsUsername').value.trim();
            const r = document.getElementById('settingsRepo').value.trim();
            const t = document.getElementById('settingsToken').value.trim();
            if (u && r && t) {
                saveSettings(u, r, t);
                document.getElementById('settingsModal').classList.remove('show');
            }
        });

        document.getElementById('closeSettingsBtn').addEventListener('click', function() {
            document.getElementById('settingsModal').classList.remove('show');
        });

        document.getElementById('settingsModal').addEventListener('click', function(e) {
            if (e.target === this) document.getElementById('settingsModal').classList.remove('show');
        });

        const typeBtns = document.querySelectorAll('.type-btn');
        let selectedType = 'bug';

        typeBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                typeBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedType = this.dataset.value;
            });
        });

        document.getElementById('ticketForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const message = document.getElementById('message').value.trim();
            if (!message) return;

            const submitBtn = document.getElementById('submitBtn');
            const statusMsg = document.getElementById('statusMsg');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            statusMsg.classList.remove('show', 'error');

            const config = getConfig();
            if (!config) {
                statusMsg.textContent = 'GitHub not configured. Click the link below to set it up.';
                statusMsg.classList.add('error');
                statusMsg.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Ticket';
                setTimeout(() => statusMsg.classList.remove('show'), 4000);
                return;
            }

            const label = selectedType === 'bug' ? 'bug' : 'suggestion';
            const shortTitle = message.substring(0, 60) + (message.length > 60 ? '...' : '');
            const title = `[${selectedType === 'bug' ? 'Bug' : 'Suggestion'}] ${shortTitle}`;

            const url = `https://api.github.com/repos/${config.username}/${config.repo}/issues`;

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${config.token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github+json'
                    },
                    body: JSON.stringify({
                        title: title,
                        body: `**Type:** ${selectedType === 'bug' ? 'Bug Report' : 'Feature Suggestion'}\n\n**Description:**\n${message}\n\n---\n*Submitted via Error Report Form*`,
                        labels: [label, 'ticket']
                    })
                });

                if (res.ok) {
                    statusMsg.textContent = 'Ticket submitted successfully.';
                    statusMsg.classList.remove('error');
                    document.getElementById('message').value = '';
                } else {
                    const err = await res.json();
                    statusMsg.textContent = 'Error: ' + (err.message || 'Submission failed.');
                    statusMsg.classList.add('error');
                }
            } catch (err) {
                statusMsg.textContent = 'Could not reach GitHub. Check your internet connection.';
                statusMsg.classList.add('error');
            }

            statusMsg.classList.add('show');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit Ticket';
            setTimeout(() => statusMsg.classList.remove('show'), 4000);
        });
    </script>
</body>
</html>
