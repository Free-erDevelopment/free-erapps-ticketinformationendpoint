<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Report Form</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            color: #2c3e50;
        }
        .container { width: 100%; max-width: 560px; }
        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 6px;
            color: #2c3e50;
            font-weight: 700;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .card {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }
        .type-toggle {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border: 1px solid #d0d0d0;
            border-radius: 10px;
            overflow: hidden;
        }
        .type-btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: #7f8c8d;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            font-family: inherit;
        }
        .type-btn:hover { background: #eef0f7; color: #2c3e50; }
        .type-btn.active { background: #344271; color: #ffffff; }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #555;
        }
        textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #d0d0d0;
            background: #fafafa;
            color: #2c3e50;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s;
            resize: vertical;
            min-height: 140px;
        }
        textarea::placeholder { color: #aaa; }
        textarea:focus {
            outline: none;
            border-color: #344271;
            box-shadow: 0 0 0 3px rgba(52, 66, 113, 0.1);
        }
        .btn-submit {
            width: 100%;
            padding: 13px 28px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            background: #344271;
            color: #ffffff;
            font-family: inherit;
            transition: opacity 0.2s, transform 0.15s;
        }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .status-msg {
            display: none;
            background: #e8f4f8;
            border: 1px solid #bce0f0;
            color: #2c6b8a;
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 16px;
            text-align: center;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .status-msg.show { display: block; }
        .status-msg.error { background: #fde8e8; border-color: #f5baba; color: #b84c4c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Report an Issue</h1>
        <p class="subtitle">Submit a bug report or feature suggestion</p>

        <div class="card">
            <form id="ticketForm">
                <div class="type-toggle" id="typeToggle">
                    <button type="button" class="type-btn active" data-value="bug">Bug Report</button>
                    <button type="button" class="type-btn" data-value="suggestion">Feature Suggestion</button>
                </div>

                <div class="form-group">
                    <label for="message">Description</label>
                    <textarea id="message" name="message" placeholder="Describe the issue or suggestion in detail..." required></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Submit Ticket</button>
                <div id="statusMsg" class="status-msg"></div>
            </form>
        </div>
    </div>

    <script>
        // ================================================================
        // PASTE YOUR CLOUDFLARE WORKER URL BELOW
        // ================================================================
        const WORKER_URL = "https://solitary-cake-16a2.landua-cedric.workers.dev/";
        // ================================================================

        const typeBtns = document.querySelectorAll('.type-btn');
        let selectedType = 'bug';

        typeBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                typeBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedType = this.dataset.value;
            });
        });

        document.getElementById('ticketForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const message = document.getElementById('message').value.trim();
            if (!message) return;

            const submitBtn = document.getElementById('submitBtn');
            const statusMsg = document.getElementById('statusMsg');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            statusMsg.classList.remove('show', 'error');

            try {
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: selectedType, message: message })
                });

                const data = await res.json();

                if (data.success) {
                    statusMsg.textContent = 'Ticket submitted successfully.';
                    statusMsg.classList.remove('error');
                    document.getElementById('message').value = '';
                } else {
                    statusMsg.textContent = 'Error: ' + (data.error || 'Submission failed.');
                    statusMsg.classList.add('error');
                }
            } catch (err) {
                statusMsg.textContent = 'Could not reach the server. Try again later.';
                statusMsg.classList.add('error');
            }

            statusMsg.classList.add('show');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit Ticket';
            setTimeout(() => statusMsg.classList.remove('show'), 4000);
        });
    </script>
</body>
</html>
